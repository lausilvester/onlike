  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --dark: #131625;
    --lime: #D1FA3E;
    --lime-hover: #c5ee30;
    --violet: #8E51B9;
    --lavender: #A08AE5;
    --magenta: #FF3EBE;
    --white: #FFFFFF;
  }

  html, body {
    min-height: 100%;
    background: var(--dark);
    color: var(--white);
    font-family: 'Outfit', sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100svh;
    padding: 3rem 1.5rem;

    max-width: 420px;

    justify-content: center;
    margin-bottom: 2.25rem;

    width: clamp(170px, 48vw, 220px);
    height: auto;
    display: block;
  }

  .links {
    width: 100%;
    max-width: 420px;
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
  }

  .link-btn {
    display: block;
    width: 100%;
    padding: 1rem 1.5rem;

    font-family: 'Outfit', sans-serif;
    font-size: 0.92rem;
    font-weight: 700;
    text-align: center;
    text-decoration: none;
    letter-spacing: 0.01em;
    transition: all 0.18s ease;
  }

  .link-btn--outline {
    background: transparent;
    border: 1px solid rgba(255,255,255,0.18);
    color: var(--white);
  }

  .link-btn--outline:hover {
    border-color: rgba(255,255,255,0.5);
    background: rgba(255,255,255,0.04);
  }

  .link-btn--lime {
    background: var(--lime);
    border: 1px solid var(--lime);
    color: var(--dark);
  }

  .link-btn--lime:hover {
    background: var(--lime-hover);
    border-color: var(--lime-hover);
    transform: translateY(-1px);
  }

  .link-btn--violet {
    background: transparent;
    border: 1px solid rgba(142,81,185,0.55);
    color: var(--lavender);
  }

  .link-btn--violet:hover {
    border-color: var(--violet);
    background: rgba(142,81,185,0.10);
    color: var(--white);
  }

  .link-btn--magenta {
    background: transparent;
    border: 1px solid rgba(255,62,190,0.58);
    color: var(--magenta);
  }

  .link-btn--magenta:hover {
    border-color: var(--magenta);
    background: rgba(255,62,190,0.10);
    transform: translateY(-1px);
  }

  .link-btn--onlike {
    background: transparent;
    border: 1px solid rgba(209,250,62,0.38);
    color: var(--lime);
  }

  .link-btn--onlike:hover {
    border-color: var(--lime);
    background: rgba(209,250,62,0.08);
  }

  .divider {
    height: 1px;
    background: rgba(255,255,255,0.07);
    margin: 0.5rem 0;
  }

  .signature {
    margin-top: 2.5rem;
    font-size: 0.72rem;
    color: rgba(255,255,255,0.25);
    letter-spacing: 0.04em;
  }

  .signature span {
    color: var(--lime);
